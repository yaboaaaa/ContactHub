<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通讯录系统 - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .register-card {
            max-width: 450px;
            width: 100%;
            border: none;
        }
        @media (max-width: 576px) {
            .register-card {
                max-width: 100%;
                margin-left: 1rem;
                margin-right: 1rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="register-card bg-light shadow rounded p-4">
        <h2 class="text-center mb-4">通讯录系统</h2>

        <!-- Error message -->
        <div class="alert alert-danger d-flex align-items-center" role="alert" th:if="${error}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </svg>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required autofocus />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码（至少6位）" required minlength="6" />
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">邮箱（可选）</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                            <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757ZM16 4.697v7.104l-5.803-3.558L16 4.697Z"/>
                        </svg>
                    </span>
                    <input type="email" id="email" name="email" class="form-control" placeholder="请输入邮箱（选填）" />
                </div>
            </div>

            <!-- Captcha -->
            <div class="mb-3" id="captchaSection" style="display:none;">
                <label class="form-label">验证码</label>
                <div class="input-group">
                    <input type="text" id="captchaInput" name="captcha" class="form-control" placeholder="请输入验证码" autocomplete="off">
                    <button type="button" class="btn btn-outline-secondary" onclick="loadCaptcha()">
                        <img id="captchaImage" src="" alt="验证码" style="height: 36px; cursor: pointer;">
                    </button>
                </div>
            </div>

            <!-- Submit button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">注 册</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">已有账号？</span>
            <a th:href="@{/login}" class="text-decoration-none">立即登录</a>
        </div>
    </div>
    <script>
    function loadCaptcha() {
        fetch('/captcha')
            .then(res => res.json())
            .then(data => {
                if (data.enabled) {
                    document.getElementById('captchaSection').style.display = 'block';
                    document.getElementById('captchaImage').src = data.image;
                } else {
                    document.getElementById('captchaSection').style.display = 'none';
                }
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadCaptcha();
        document.getElementById('captchaImage').addEventListener('click', loadCaptcha);
    });
    </script>
</body>
</html>
