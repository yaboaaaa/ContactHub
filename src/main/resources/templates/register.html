<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title.register}">通讯录系统 - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FBD9E1;
            min-height: 100vh;
        }
        .register-card {
            max-width: 450px;
            width: 100%;
            border: none;
        }
        .form-feedback {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            min-height: 1.25rem;
        }
        .form-feedback.valid {
            color: #198754;
        }
        .form-feedback.invalid {
            color: #dc3545;
        }
        .password-strength {
            height: 6px;
            border-radius: 3px;
            background-color: #e9ecef;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .password-strength-bar.weak {
            width: 25%;
            background-color: #dc3545;
        }
        .password-strength-bar.medium {
            width: 50%;
            background-color: #fd7e14;
        }
        .password-strength-bar.good {
            width: 75%;
            background-color: #0d6efd;
        }
        .password-strength-bar.strong {
            width: 100%;
            background-color: #198754;
        }
        .password-strength-text {
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        @media (max-width: 576px) {
            .register-card {
                max-width: 100%;
                margin-left: 1rem;
                margin-right: 1rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="register-card bg-light shadow rounded p-4">
        <h2 th:text="#{app.name}" class="text-center mb-4">通讯录系统</h2>

        <!-- Error message -->
        <div class="alert alert-danger d-flex align-items-center" role="alert" th:if="${error}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </svg>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Username -->
            <div class="mb-3">
                <label th:text="#{register.username}" for="username" class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" class="form-control" th:placeholder="#{register.placeholder.username}" placeholder="请输入用户名" required autofocus />
                </div>
                <div id="usernameFeedback" class="form-feedback"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label th:text="#{register.password}" for="password" class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" class="form-control" th:placeholder="#{register.placeholder.password}" placeholder="请输入密码（至少6位）" required minlength="6" />
                </div>
                <div class="password-strength">
                    <div id="passwordStrengthBar" class="password-strength-bar"></div>
                </div>
                <div id="passwordStrengthText" class="password-strength-text text-muted"></div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label th:text="#{register.email}" for="email" class="form-label">邮箱（可选）</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                            <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757ZM16 4.697v7.104l-5.803-3.558L16 4.697Z"/>
                        </svg>
                    </span>
                    <input type="email" id="email" name="email" class="form-control" th:placeholder="#{register.email.placeholder}" placeholder="请输入邮箱（选填）" />
                </div>
            </div>

            <!-- Captcha -->
            <div class="mb-3" id="captchaSection" style="display:none;">
                <label th:text="#{register.captcha}" class="form-label">验证码</label>
                <div class="input-group">
                    <input type="text" id="captchaInput" name="captcha" class="form-control" th:placeholder="#{register.placeholder.captcha}" placeholder="请输入验证码" autocomplete="off">
                    <button type="button" class="btn btn-outline-secondary" onclick="loadCaptcha()">
                        <img id="captchaImage" src="" th:alt="#{register.captcha}" alt="验证码" style="height: 36px; cursor: pointer;">
                    </button>
                </div>
            </div>

            <!-- Submit button -->
            <div class="d-grid">
                <button th:text="#{register.btn}" type="submit" class="btn btn-primary btn-lg">注 册</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <span th:text="#{register.hasAccount}" class="text-muted">已有账号？</span>
            <a th:text="#{register.login}" th:href="@{/login}" class="text-decoration-none">立即登录</a>
        </div>
        <div class="text-center mt-2">
            <a th:href="@{?lang=zh}" class="text-decoration-none me-2">中文</a>
            <a th:href="@{?lang=en}" class="text-decoration-none">English</a>
        </div>
    </div>
    <script th:inline="javascript">
    function loadCaptcha() {
        fetch('/captcha')
            .then(res => res.json())
            .then(data => {
                if (data.enabled) {
                    document.getElementById('captchaSection').style.display = 'block';
                    document.getElementById('captchaImage').src = data.image;
                } else {
                    document.getElementById('captchaSection').style.display = 'none';
                }
            });
    }

    let usernameCheckTimer = null;
    let lastCheckedUsername = '';

    function checkUsername(username) {
        const feedback = document.getElementById('usernameFeedback');
        if (!username || username.trim().length === 0) {
            feedback.textContent = '';
            feedback.className = 'form-feedback';
            return;
        }

        feedback.textContent = /*[[#{register.usernameChecking}]]*/ '检查中...';
        feedback.className = 'form-feedback text-muted';

        fetch('/register/check-username?username=' + encodeURIComponent(username.trim()))
            .then(res => res.json())
            .then(result => {
                if (username !== document.getElementById('username').value) {
                    return;
                }
                if (result.code === 200 && result.data === true) {
                    feedback.textContent = /*[[#{register.usernameAvailable}]]*/ '用户名可用';
                    feedback.className = 'form-feedback valid';
                } else {
                    feedback.textContent = /*[[#{register.usernameTaken}]]*/ '用户名已被占用';
                    feedback.className = 'form-feedback invalid';
                }
            })
            .catch(() => {
                feedback.textContent = '';
                feedback.className = 'form-feedback';
            });
    }

    function evaluatePassword(password) {
        if (!password || password.length < 6) {
            return { level: 0, label: /*[[#{register.pwdTooShort}]]*/ '密码至少6位' };
        }
        let score = 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
        if (/\d/.test(password)) score++;
        if (/[^a-zA-Z0-9]/.test(password)) score++;

        const labels = [
            /*[[#{register.pwdWeak}]]*/ '弱',
            /*[[#{register.pwdMedium}]]*/ '中',
            /*[[#{register.pwdGood}]]*/ '良',
            /*[[#{register.pwdStrong}]]*/ '强'
        ];
        const level = Math.min(Math.floor(score / 2) + 1, 4);
        return { level: level, label: labels[level - 1] };
    }

    function updatePasswordStrength(password) {
        const bar = document.getElementById('passwordStrengthBar');
        const text = document.getElementById('passwordStrengthText');
        const result = evaluatePassword(password);

        bar.className = 'password-strength-bar';
        if (result.level === 1) bar.classList.add('weak');
        else if (result.level === 2) bar.classList.add('medium');
        else if (result.level === 3) bar.classList.add('good');
        else if (result.level === 4) bar.classList.add('strong');

        if (!password) {
            text.textContent = '';
        } else {
            text.textContent = result.label;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadCaptcha();
        document.getElementById('captchaImage').addEventListener('click', loadCaptcha);

        const usernameInput = document.getElementById('username');
        usernameInput.addEventListener('input', function() {
            clearTimeout(usernameCheckTimer);
            const username = this.value;
            if (username === lastCheckedUsername) {
                return;
            }
            lastCheckedUsername = username;
            usernameCheckTimer = setTimeout(() => checkUsername(username), 300);
        });
        usernameInput.addEventListener('blur', function() {
            clearTimeout(usernameCheckTimer);
            checkUsername(this.value);
        });

        document.getElementById('password').addEventListener('input', function() {
            updatePasswordStrength(this.value);
        });
    });
    </script>
</body>
</html>
