<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar(activePage)">
    <div class="container">
        <a class="navbar-brand" th:href="@{/contacts}" th:text="#{app.name}">通讯录系统</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contacts}" th:classappend="${activePage == 'contacts'} ? 'active'" th:text="#{nav.contacts}">通讯录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contacts/recycle}" th:classappend="${activePage == 'recycle'} ? 'active'" th:text="#{nav.recycle}">回收站</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}" th:classappend="${activePage == 'admin'} ? 'active'" th:text="#{nav.admin}">用户管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/profile}" th:classappend="${activePage == 'profile'} ? 'active'" th:text="#{nav.profile}">个人信息</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/logout}" th:text="#{nav.logout}">退出登录</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown">
                        🌐
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{?lang=zh}">中文</a></li>
                        <li><a class="dropdown-item" th:href="@{?lang=en}">English</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
