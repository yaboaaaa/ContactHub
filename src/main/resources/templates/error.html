<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title.error}">错误 - 通讯录系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: #FBD9E1;">
    <div class="text-center">
        <h1 class="display-1 text-danger" th:text="${code} ?: '500'">500</h1>
        <p class="lead" th:text="${message} ?: #{error.serverError}">服务器内部错误</p>
        <a th:text="#{btn.backHome}" th:href="@{/contacts}" class="btn btn-primary">返回首页</a>
    </div>
</body>
</html>
