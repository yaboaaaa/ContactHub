<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 通讯录系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .container {
            max-width: 1200px;
        }
        .badge-admin {
            background-color: #dc3545;
        }
        .badge-user {
            background-color: #0d6efd;
        }
        .badge-enabled {
            background-color: #198754;
        }
        .badge-disabled {
            background-color: #6c757d;
        }
        .page-header {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .table-responsive {
                font-size: 0.875rem;
            }
            .btn-sm {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">通讯录系统 - 管理后台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contacts}">通讯录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/users}">用户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">用户管理</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-plus-fill me-1" viewBox="0 0 16 16">
                    <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                    <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5z"/>
                </svg>
                新增用户
            </button>
        </div>

        <!-- 提示消息 -->
        <div id="alertContainer"></div>

        <!-- 用户列表 -->
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role == 'ADMIN'}" class="badge badge-admin">管理员</span>
                            <span th:unless="${user.role == 'ADMIN'}" class="badge badge-user">普通用户</span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge badge-enabled">启用</span>
                            <span th:unless="${user.enabled}" class="badge badge-disabled">禁用</span>
                        </td>
                        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <div th:if="${user.role != 'ADMIN'}" class="d-flex gap-1">
                                <button class="btn btn-sm btn-warning toggle-btn"
                                        th:data-id="${user.id}"
                                        th:data-enabled="${user.enabled}"
                                        th:text="${user.enabled} ? '禁用' : '启用'">
                                </button>
                                <button class="btn btn-sm btn-danger delete-btn"
                                        th:data-id="${user.id}"
                                        th:data-username="${user.username}">
                                    删除
                                </button>
                            </div>
                            <span th:unless="${user.role != 'ADMIN'}" class="text-muted small">-</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增用户模态框 -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新增用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveUserBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要删除用户 <strong id="deleteUserName"></strong> 吗？此操作将同时删除该用户的所有联系人和分组，且不可恢复。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function getCsrfToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const parts = cookie.trim().split('=');
                if (parts[0] === 'XSRF-TOKEN') {
                    return parts[1];
                }
            }
            return '';
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function refreshTable() {
            fetch('/admin/users/data', {
                headers: {
                    'X-XSRF-TOKEN': getCsrfToken()
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200 && result.data) {
                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = '';
                    result.data.forEach(user => {
                        const isAdmin = user.role === 'ADMIN';
                        const tr = document.createElement('tr');
                        const createdAt = user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit'
                        }) : '-';
                        tr.innerHTML = `
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.username)}</td>
                            <td>${escapeHtml(user.email || '-')}</td>
                            <td>${isAdmin
                                ? '<span class="badge badge-admin">管理员</span>'
                                : '<span class="badge badge-user">普通用户</span>'}
                            </td>
                            <td>${user.enabled
                                ? '<span class="badge badge-enabled">启用</span>'
                                : '<span class="badge badge-disabled">禁用</span>'}
                            </td>
                            <td>${createdAt}</td>
                            <td>${isAdmin
                                ? '<span class="text-muted small">-</span>'
                                : `<div class="d-flex gap-1">
                                    <button class="btn btn-sm btn-warning toggle-btn"
                                            data-id="${user.id}"
                                            data-enabled="${user.enabled}">
                                        ${user.enabled ? '禁用' : '启用'}
                                    </button>
                                    <button class="btn btn-sm btn-danger delete-btn"
                                            data-id="${user.id}"
                                            data-username="${escapeHtml(user.username)}">
                                        删除
                                    </button>
                                </div>`}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    bindEvents();
                }
            })
            .catch(error => {
                showAlert('加载用户列表失败', 'danger');
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function bindEvents() {
            // 启用/禁用切换
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    fetch(`/admin/users/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-XSRF-TOKEN': getCsrfToken()
                        },
                        body: 'enabled=' + (this.dataset.enabled === 'true' ? 'false' : 'true')
                    })
                    .then(response => response.json())
                    .then(result => {
                        if (result.code === 200) {
                            showAlert('状态更新成功', 'success');
                            refreshTable();
                        } else {
                            showAlert(result.message || '操作失败', 'danger');
                        }
                    })
                    .catch(() => showAlert('网络错误', 'danger'));
                });
            });

            // 删除按钮
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('deleteUserName').textContent = this.dataset.username;
                    document.getElementById('confirmDeleteBtn').dataset.id = this.dataset.id;
                    const modal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
                    modal.show();
                });
            });
        }

        // 确认删除
        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            const id = this.dataset.id;
            fetch(`/admin/users/${id}`, {
                method: 'DELETE',
                headers: {
                    'X-XSRF-TOKEN': getCsrfToken()
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    showAlert('删除成功', 'success');
                    refreshTable();
                    bootstrap.Modal.getInstance(document.getElementById('deleteConfirmModal')).hide();
                } else {
                    showAlert(result.message || '删除失败', 'danger');
                }
            })
            .catch(() => showAlert('网络错误', 'danger'));
        });

        // 保存新增用户
        document.getElementById('saveUserBtn').addEventListener('click', function() {
            const form = document.getElementById('addUserForm');
            const formData = new URLSearchParams(new FormData(form));

            fetch('/admin/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-XSRF-TOKEN': getCsrfToken()
                },
                body: formData.toString()
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    showAlert('用户创建成功', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                    form.reset();
                    refreshTable();
                } else {
                    showAlert(result.message || '创建失败', 'danger');
                }
            })
            .catch(() => showAlert('网络错误', 'danger'));
        });

        // 初始绑定
        bindEvents();
    </script>
</body>
</html>
