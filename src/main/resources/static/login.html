<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.title.login">通讯录系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #E7F1F7, #BFD8E6 60%, #FFF2D9);
            min-height: 100vh;
            background-attachment: fixed;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            border: none;
        }
        @media (max-width: 576px) {
            .login-card {
                max-width: 100%;
                margin-left: 1rem;
                margin-right: 1rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="login-card bg-light shadow rounded p-4">
        <h2 data-i18n="app.name" class="text-center mb-4">通讯录系统</h2>

        <div id="alertArea"></div>

        <form action="/login" method="post">
            <input type="hidden" name="_csrf" id="csrfField">

            <div class="mb-3">
                <label data-i18n="login.username" for="username" class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required autofocus />
                </div>
            </div>

            <div class="mb-3">
                <label data-i18n="login.password" for="password" class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required />
                </div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input" />
                <label data-i18n="login.remember" for="remember-me" class="form-check-label">记住我</label>
            </div>

            <div class="mb-3" id="captchaSection" style="display:none;">
                <label data-i18n="login.captcha" class="form-label">验证码</label>
                <div class="input-group">
                    <input type="text" id="captchaInput" name="captcha" class="form-control" placeholder="请输入验证码" autocomplete="off">
                    <button type="button" class="btn btn-outline-secondary" id="captchaRefreshBtn" onclick="loadCaptcha()">
                        <img id="captchaImage" src="" alt="验证码" style="height: 36px; cursor: pointer;">
                    </button>
                </div>
            </div>

            <div class="d-grid">
                <button data-i18n="login.btn" type="submit" class="btn btn-primary btn-lg">登 录</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <span data-i18n="login.noAccount" class="text-muted">还没有账号？</span>
            <a data-i18n="login.register" href="/register.html" class="text-decoration-none">立即注册</a>
        </div>
        <div class="text-center mt-2">
            <a href="javascript:setLang('zh')" class="text-decoration-none me-2">中文</a>
            <a href="javascript:setLang('en')" class="text-decoration-none">English</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/i18n.js"></script>
    <script>
        // Set CSRF token in form
        var match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
        if (match) document.getElementById('csrfField').value = decodeURIComponent(match[1]);

        function loadCaptcha() {
            fetch('/api/v1/captcha')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.enabled) {
                        document.getElementById('captchaSection').style.display = 'block';
                        document.getElementById('captchaImage').src = data.image;
                    } else {
                        document.getElementById('captchaSection').style.display = 'none';
                    }
                });
        }

        loadI18n().then(function() {
            // Show messages AFTER i18n loads
            var params = new URLSearchParams(location.search);
            var alertArea = document.getElementById('alertArea');

            if (params.has('error')) {
                alertArea.innerHTML = '<div class="alert alert-danger d-flex align-items-center" role="alert">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">' +
                    '<path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>' +
                    '</svg><span>' + t('login.error', '用户名或密码错误，请重新输入。') + '</span></div>';
            } else if (params.has('logout')) {
                alertArea.innerHTML = '<div class="alert alert-success d-flex align-items-center" role="alert">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16">' +
                    '<path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>' +
                    '</svg><span>' + t('login.logout', '您已成功退出登录。') + '</span></div>';
            } else if (params.has('registered')) {
                alertArea.innerHTML = '<div class="alert alert-success d-flex align-items-center" role="alert">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16">' +
                    '<path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>' +
                    '</svg><span>' + t('login.registered', '注册成功，请登录。') + '</span></div>';
            }

            loadCaptcha();
            document.getElementById('captchaImage').addEventListener('click', loadCaptcha);
        });
    </script>
</body>
</html>
