server:
  port: 8087
  servlet:
    session:
      timeout: 30m

spring:
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# Swagger/OpenAPI configuration
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Admin account configuration
admin:
  username: admin
  password: admin123

# File upload limits
upload:
  avatar:
    dir: uploads/avatars
    max-size: 2097152  # 2MB
    allowed-types: image/jpeg,image/png
  import:
    max-size: 10485760  # 10MB
    max-rows: 5000

# Captcha configuration
captcha:
  enabled: false